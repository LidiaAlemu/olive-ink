<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Olive & Ink</title>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet" />

    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div id="app">
        <!-- Navigation Bar -->
        <nav class="navbar" id="navbar">
            <div class="nav-container">
                <a href="#home" class="logo-link">
                    <svg class="logo-img" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/>
                    </svg>
                </a>
                <ul class="nav-links" id="navLinks">
                    <li><a href="#home" class="nav-item active">Home</a></li>
                    <li><a href="#about" class="nav-item">About</a></li>
                    <li><a href="#reviews" class="nav-item">Reviews</a></li>
                    <li><a href="#quotes" class="nav-item">Quotes</a></li>
                    <li><a href="#journal" class="nav-item">Journal</a></li>
                    <li><a href="#community" class="nav-item">Community</a></li>
                    <li><a href="#contact" class="nav-item">Contact</a></li>
                </ul>
                <div class="nav-actions">
                    <div class="search-container">
                        <input type="text" class="search-input" placeholder="search books, authors, articles" id="searchInput" />
                        <button class="search-btn" aria-label="Search">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                        </button>
                    </div>
                    <button id="authBtn" class="btn-outline">Login</button>
                </div>
                <button class="hamburger" id="hamburger" aria-label="Menu">
                    <span></span><span></span><span></span>
                </button>
            </div>
        </nav>

        <!-- Page containers (content loaded dynamically) -->
        <section id="home" class="page active"></section>
        <section id="about" class="page"></section>
        <section id="reviews" class="page"></section>
        <section id="quotes" class="page"></section>
        <section id="journal" class="page"></section>
        <section id="community" class="page"></section>
        <section id="contact" class="page"></section>

        <footer class="main-footer">Footer (coming soon)</footer>
    </div>

    <script src="firebase.js"></script>
    <script src="app.js"></script>
</body>
</html>
